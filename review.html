<!DOCTYPE html>
<html>
<head>
<title>Reviews</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#ff9a9e,#fecfef);
}

/* Sidebar */
.sidebar{
  width:220px;
  background:#ff6ec4;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.sidebar h2{
  color:white;
  margin-bottom:30px;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#260217;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover{
  background:#ff4db8;
  transform:scale(1.05);
}

/* Content */
.content{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Card */
.card{
  background:#ffe6f0;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  width:350px;
  text-align:center;
}

/* Stars */
.star{
  font-size:25px;
  cursor:pointer;
  color:#ccc;
}

.star.active{
  color:gold;
}

/* Input */
textarea{
  width:90%;
  height:80px;
  margin-top:10px;
  border-radius:8px;
  padding:10px;
  border:1px solid #ccc;
}

/* Button */
button{
  background:#260217;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}
button:hover{
  background:#ff4db8;
}

/* Review list */
.review-box{
  margin-top:15px;
  text-align:left;
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>Library</h2>
  <button onclick="go('home.html')">Home</button>
  <button onclick="go('books.html')">Books</button>
  <button onclick="go('borrow.html')">Borrow</button>
  <button onclick="go('categories.html')">Categories</button>
  <button onclick="go('logs.html')">Logs</button>
  <button onclick="go('dashboard.html')">Dashboard</button>
  <button onclick="go('review.html')">Review</button>
</div>

<!-- Content -->
<div class="content">
  <div class="card">
    <h3>Give Review</h3>

    <!-- Stars -->
    <div id="stars">
      <span class="star" onclick="rate(1)">★</span>
      <span class="star" onclick="rate(2)">★</span>
      <span class="star" onclick="rate(3)">★</span>
      <span class="star" onclick="rate(4)">★</span>
      <span class="star" onclick="rate(5)">★</span>
    </div>

    <!-- Text -->
    <textarea id="reviewText" placeholder="Write your review..."></textarea>

    <button onclick="submitReview()">Submit</button>

    <!-- Display -->
    <div id="reviews"></div>
  </div>
</div>

<script>
let rating = 0;
let reviews = [];

// Set rating
function rate(n){
  rating = n;
  let stars = document.querySelectorAll('.star');
  stars.forEach((s,i)=>{
    s.classList.toggle('active', i < n);
  });
}

// Submit review
function submitReview(){
  let text = document.getElementById('reviewText').value;
  if(text){
    reviews.push({rating,text});
    displayReviews();
    document.getElementById('reviewText').value='';
  }
}

// Display reviews
function displayReviews(){
  let div = document.getElementById('reviews');
  div.innerHTML='';
  reviews.forEach(r=>{
    let box = document.createElement('div');
    box.className='review-box';
    box.innerHTML = "⭐".repeat(r.rating) + "<br>" + r.text;
    div.appendChild(box);
  });
}

// Navigation
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
